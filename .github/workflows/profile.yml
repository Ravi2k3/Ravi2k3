name: profile stats
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: generate panels
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: python3 .github/scripts/generate.py --require-live
      - name: commit refreshed svgs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          if ! git diff --staged --quiet; then
            git commit -m "chore: refresh profile stats and language split"
            git push
          fi
