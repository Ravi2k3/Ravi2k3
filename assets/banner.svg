<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Ravi Krishna, terminal: access granted to the reader, denied to everyone else">
  <defs>
    <clipPath id="r"><rect width="1200" height="380" rx="14"/></clipPath>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <rect width="4" height="1" y="0" fill="#7CFFB0" opacity="0.05"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vig" cx="22%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#16241A"/>
      <stop offset="60%" stop-color="#0B0F0C"/>
      <stop offset="100%" stop-color="#070907"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#r)">
    <rect width="1200" height="380" fill="url(#vig)"/>
    <rect width="1200" height="380" fill="url(#scan)"/>

    <!-- title bar -->
    <rect width="1200" height="46" fill="#11160F"/>
    <circle cx="28" cy="23" r="6" fill="#FF5F56"/>
    <circle cx="50" cy="23" r="6" fill="#FEBC2E"/>
    <circle cx="72" cy="23" r="6" fill="#28C840"/>
    <text x="600" y="28" text-anchor="middle" font-size="14" fill="#5A6B5E" letter-spacing="1">ravi@boundary : ~/resolver</text>

    <!-- watermark -->
    <text x="1170" y="350" text-anchor="end" font-size="120" font-weight="700" fill="#38E07B" opacity="0.05" letter-spacing="-4">ref://</text>

    <g font-size="18">
      <!-- whoami -->
      <text x="40" y="96"><tspan fill="#38E07B">ravi@boundary</tspan><tspan fill="#5A6B5E"> ~ %</tspan><tspan fill="#E6EFE8"> whoami</tspan></text>
      <text x="40" y="124" fill="#C8D6CC">Ravi Krishna · product manager who ships the systems he designs</text>

      <!-- granted -->
      <text x="40" y="172"><tspan fill="#38E07B">ravi@boundary</tspan><tspan fill="#5A6B5E"> ~ %</tspan><tspan fill="#E6EFE8"> resolve </tspan><tspan fill="#7FB0FF">ref://mail/9f2c4a1e</tspan><tspan fill="#E8B339"> --viewer recipient</tspan></text>
      <g filter="url(#glow)"><text x="40" y="200" font-weight="700" fill="#38E07B">[ ACCESS GRANTED ]</text></g>
      <text x="258" y="200" fill="#5A6B5E">resolved in your scope</text>

      <!-- denied -->
      <text x="40" y="248"><tspan fill="#38E07B">ravi@boundary</tspan><tspan fill="#5A6B5E"> ~ %</tspan><tspan fill="#E6EFE8"> resolve </tspan><tspan fill="#7FB0FF">ref://mail/9f2c4a1e</tspan><tspan fill="#E8B339"> --viewer off-thread</tspan></text>
      <g filter="url(#glow)"><text x="40" y="276" font-weight="700" fill="#FF5F56">[ ACCESS DENIED · 403 ]</text></g>
      <text x="312" y="276" fill="#5A6B5E">not in your identity. nothing leaks.</text>

      <!-- prompt + cursor -->
      <text x="40" y="324"><tspan fill="#38E07B">ravi@boundary</tspan><tspan fill="#5A6B5E"> ~ %</tspan></text>
      <rect x="170" y="310" width="11" height="20" fill="#38E07B">
        <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="379" rx="14" fill="none" stroke="#2A332C"/>
</svg>
